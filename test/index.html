<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>

    <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #00000; /* Background color of the page */
        }

        #game-container {
            width: 550px;
            height: 400px;
            position: center;
            top: 100px;
            left: 100px;
        }

        h1 {
            position: absolute;
            top: 20px;
            text-align: center;
            width: 100%;
            color: #333;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script>
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();

            const container = document.getElementById("game-container");
            container.appendChild(player);

            player.load("penguin-diner-801.swf");
        });
    </script>
</body>
</html>
