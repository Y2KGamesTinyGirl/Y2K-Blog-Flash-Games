<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8">
    <title>🌺 Y2K Games</title>

    <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200vh;
            margin: 0;
            background-color: #FFC7EA; /* Cor de fundo da página */
        }

        #game-container {
            width: 100%;
            height: 80vh;
            max-width: 800px;  /* Ajuste o valor conforme necessário */
            max-height: 600px; /* Ajuste o valor conforme necessário */
            position: absolute;
            top: 50vh;
            left: 50vw;
            border: 20px solid rgba(255, 165, 0, 0.7); /* Borda laranja com transparência */
            border-radius: 55px; /* Bordas arredondadas */
            background: rgba(255, 165, 0, 0.1); /* Fundo transparente com tom laranja */
            box-shadow: 0 0 55px 5px rgba(255, 165, 0, 0.8); /* Efeito neon laranja */
            backdrop-filter: blur(50px); /* Efeito de desfoque para imitar vidro */
            overflow: hidden; /* Garante que o conteúdo não saia do contêiner */
        }

        h1 {
            position: absolute;
            top: 20px;
            text-align: center;
            width: 100%;
            color: #333;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script>
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();

            const container = document.getElementById("game-container");
            container.appendChild(player);

            player.load("penguin-diner-801.swf");

            // Ajuste de escala
            player.style.transform = "scale(0.8)";  // Tente ajustar o valor da escala para "scale(0.8)" ou "scale(1.2)" se necessário.
            player.style.transformOrigin = "top left";  // Alinha o jogo ao canto superior esquerdo
        });
    </script>
</body>
</html>
