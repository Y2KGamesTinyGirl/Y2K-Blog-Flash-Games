<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo Flash com Ruffle</title>
    <script src="https://unpkg.com/ruffle.js"></script> <!-- Inclusão do Ruffle -->
    <style>
        body {
            text-align: center;
            padding-top: 50px;
        }
        #flash-container {
            max-width: 800px;
            margin: 0 auto;
            background: #000;
        }
    </style>
</head>
<body>
    <h1>Jogo Flash com Ruffle</h1>
    <div id="flash-container"></div>
    <script>
        // Criação do emulador Ruffle
        window.addEventListener("load", function() {
            const ruffle = window.RufflePlayer.new();
            const container = document.getElementById("flash-container");
            const player = ruffle.createPlayer();

            // Aponte para o seu arquivo SWF no GitHub ou caminho local
            player.load("410250_burger_restaurant.swf");
            container.appendChild(player);
        });
    </script>
</body>
</html>
