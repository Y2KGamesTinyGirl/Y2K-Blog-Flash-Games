<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo Flash com Ruffle</title>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        body {
            text-align: center;
            padding-top: 50px;
        }
        #flash-container {
            max-width: 800px;
            margin: 0 auto;
            background: #000;
            border: 2px solid #000; /* Borda de 2px */
            height: 600px; /* Ajuste a altura conforme necessário */
        }
    </style>
</head>
<body>
    <h1>Jogo Flash com Ruffle</h1>
    <div id="flash-container"></div>
    <script>
        window.addEventListener("load", function() {
            const ruffle = window.RufflePlayer.new(); // Inicializa o Ruffle
            const container = document.getElementById("flash-container");
            const player = ruffle.createPlayer();
            
            // Substitua pelo caminho correto do seu arquivo SWF
            player.load("410250_burger_restaurant.swf"); // Verifique o caminho do arquivo
            container.appendChild(player); // Adiciona o player ao container
        });
    </script>
</body>
</html>
