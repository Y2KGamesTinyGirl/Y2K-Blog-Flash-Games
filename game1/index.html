<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo Flash com Ruffle</title>
  <!-- Carrega o Ruffle via CDN -->
  <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>
  <style>
    /* Estilo para centralizar o jogo na tela */
    html, body {
      height: 120%; /* Corrigido para preencher 100% da altura */
      margin: 50;
      display: ;
      justify-content: right; /* Mantém o jogo centralizado horizontalmente */
    }
    #flash-game {
      width: 800px; /* Largura do jogo (ajuste conforme necessário) */
      height: 600px; /* Altura do jogo (ajuste conforme necessário) */
      margin-bottom: 0px; /* Adiciona um pequeno espaço na parte inferior */
      
      /* Neon glass-style border */
      border: 2px solid rgba(255, 255, 255, 0.2); /* Subtle glass border */
      border-radius: 15px; /* Rounded corners */
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.7), 
                  0 0 30px rgba(0, 255, 255, 0.5), 
                  0 0 45px rgba(0, 255, 255, 0.3), 
                  0 0 60px rgba(0, 255, 255, 0.2); /* Neon glow effect */
      backdrop-filter: blur(8px); /* Adds glass blur effect */
    }
  </style>
</head>
<body>

  <!-- Área para carregar o jogo -->
  <div id="flash-game">
    <script>
      // Inicializa o player Ruffle
      var ruffle = window.RufflePlayer.newest();
      var player = ruffle.createPlayer();
      document.getElementById('flash-game').appendChild(player);

      // Carrega o jogo SWF (substitua 'game.swf' pelo nome do seu arquivo SWF)
      player.load('410250_burger_restaurant.swf');
    </script>
  </div>

</body>
</html>
