<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo Flash com Ruffle</title>
  <!-- Carrega o Ruffle via CDN -->
  <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>
  <style>
    /* Estilo para centralizar o jogo na tela */
    html, body {
      height: 100%; /* Corrigido para preencher 100% da altura */
      margin: 0;
      display: flex;
      justify-content: center; /* Mantém o jogo centralizado horizontalmente */
      align-items: flex-end; /* Alinha o conteúdo na parte inferior da tela */
      background-color: #f0f0f0; /* Cor de fundo */
    }
    #flash-game {
      width: 800px; /* Largura do jogo (ajuste conforme necessário) */
      height: 600px; /* Altura do jogo (ajuste conforme necessário) */
      margin-bottom: 20px; /* Adiciona um pequeno espaço na parte inferior */
    }
  </style>
</head>
<body>

  <!-- Área para carregar o jogo -->
  <div id="flash-game">
    <script>
      // Inicializa o player Ruffle
      var ruffle = window.RufflePlayer.newest();
      var player = ruffle.createPlayer();
      document.getElementById('flash-game').appendChild(player);

      // Carrega o jogo SWF (substitua 'game.swf' pelo nome do seu arquivo SWF)
      player.load('410250_burger_restaurant.swf');
    </script>
  </div>

</body>
</html>
