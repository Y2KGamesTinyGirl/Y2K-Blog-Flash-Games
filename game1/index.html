<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flash Game</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>
</head>
<body>
  <div id="game-container"></div> <!-- Container onde o jogo será carregado -->

  <script>
    window.addEventListener("load", () => {
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      document.getElementById("game-container").appendChild(player);
      player.load("shopaholic_hawaii.swf"); // Carrega o jogo
    });
  </script>
</body>
</html>
