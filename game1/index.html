<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <!-- Carrega o Ruffle via CDN -->
  <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>
  <style>
    /* CSS para centralizar o conteúdo */
    body, html {
      height: 100%;  /* Garante que o body e html ocupem toda a altura */
      margin: 0;
      display: flex;
      justify-content: center;  /* Centraliza horizontalmente */
      align-items: center;      /* Centraliza verticalmente */
      background-color: #f0f0f0;  /* Cor de fundo suave */
    }

    #flash-game {
      width: 80vw;  /* 80% da largura da tela */
      height: 80vh; /* 80% da altura da tela */
      max-width: 800px;  /* Limita a largura máxima */
      max-height: 600px; /* Limita a altura máxima */
    }
  </style>
</head>
<body>
  <h1 style="text-align: center;">Jogo Flash com Ruffle</h1>

  <!-- Área para carregar o jogo -->
  <div id="flash-game">
    <script>
      // Inicializa o player Ruffle
      var ruffle = window.RufflePlayer.newest();
      var player = ruffle.createPlayer();
      document.getElementById('flash-game').appendChild(player);

      // Carrega o jogo SWF (substitua 'game.swf' pelo nome do seu arquivo SWF)
      player.load('game.swf');
    </script>
  </div>

</body>
</html>
