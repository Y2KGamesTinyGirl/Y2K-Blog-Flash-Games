<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flash Game</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #ffffff; /* Cor de fundo inicial */
      flex-direction: column;
    }

    #game-container {
      width: 800px;
      height: 600px;
    }

    input {
      margin-top: 20px;
      padding: 10px;
      font-size: 16px;
      width: 250px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="game-container"></div> <!-- Container onde o jogo será carregado -->
  <input type="text" id="bg-color" placeholder="Digite a cor (ex: #ff5733)" />

  <script>
    window.addEventListener("load", () => {
      const ruffle = window.RufflePlayer.newest(); // Cria a versão mais recente do player Ruffle
      const player = ruffle.createPlayer(); // Cria o player para rodar o arquivo SWF
      document.getElementById("game-container").appendChild(player); // Adiciona o player ao container
      player.load("410250_burger_restaurant.swf"); // Carrega o arquivo SWF do jogo

      // Função para alterar a cor de fundo
      const colorInput = document.getElementById("bg-color");
      colorInput.addEventListener("input", function() {
        // Verifica se a cor é válida
        if(/^#[0-9A-F]{6}$/i.test(this.value)) {
          document.body.style.backgroundColor = this.value;
        }
      });
    });
  </script>
</body>
</html>
