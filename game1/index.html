<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa Divertida</title>
    <style>
        body {
            background-color: #1e3a8a; /* Cor de fundo azul */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .caixa {
            width: 200px;
            height: 200px;
            background-color: #fff; /* Fundo branco */
            border-radius: 20px; /* Bordas arredondadas */
            border: 10px solid transparent; /* Inicializa borda transparente */
            background-image: linear-gradient(white, white), 
                              radial-gradient(circle, #ff007f, #ff6600, #00ff00, #00ccff, #ffcc00, #ff007f); /* Borda colorida com gradiente */
            background-origin: border-box; /* Aplica o gradiente ao redor da caixa */
            background-clip: content-box, border-box; /* Garante que o gradiente cubra apenas a borda */
            animation: bordaDivertida 4s infinite linear; /* Animação divertida */
        }

        /* Animação para a borda colorida */
        @keyframes bordaDivertida {
            0% {
                background-image: radial-gradient(circle, #ff007f, #ff6600, #00ff00, #00ccff, #ffcc00, #ff007f);
            }
            50% {
                background-image: radial-gradient(circle, #ff6600, #00ff00, #00ccff, #ff007f, #ffcc00, #ff6600);
            }
            100% {
                background-image: radial-gradient(circle, #00ff00, #00ccff, #ff007f, #ff6600, #ffcc00, #00ff00);
            }
        }
    </style>
</head>
<body>
    <div class="caixa"></div>
</body>
</html>
