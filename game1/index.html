<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title></title>

    <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fab3dd; /* Cor de fundo da página */
        }

        #game-container {
            width: 800px;
            height: 600px;
            position: relative;
            top: 60px;
            left: 140px;
        }

        h1 {
            position: absolute;
            top: 20px;
            text-align: center;
            width: 100%;
            color: #333;
        }

        /* Estilo do botão de like */
        #like-button {
            position: absolute;
            bottom: 0px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #fff; /* Fundo branco */
            border: 2px solid #fab3dd; /* Bordas sutis */
            padding: 8px 16px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 26px;
            color: #333;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        /* Estilo ao passar o mouse */
        #like-button:hover {
            background-color: rgba(255, 165, 0, 0.8);
            transform: translateX(-50%) scale(1.1);
        }

        #like-button:focus {
            outline: none;
        }

        #like-button span {
            font-size: 24px;
        }

        /* Estilo do número de likes */
        #like-count {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            font-weight: bold;
            font-size: 18px;
            color: #FF69B4;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <button id="like-button">
        <span>🍭</span><span id="like-count">0</span>
    </button>

    <script>
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();

            const container = document.getElementById("game-container");
            container.appendChild(player);

            player.load("410250_burger_restaurant.swf");
        });

        // Variáveis
        let likeCount = localStorage.getItem("likeCount") ? parseInt(localStorage.getItem("likeCount")) : 0;
        const likeButton = document.getElementById("like-button");
        const likeCountElement = document.getElementById("like-count");

        // Atualiza o contador de curtidas com o valor armazenado
        likeCountElement.textContent = likeCount;

        // Função para o botão de like
        likeButton.addEventListener("click", () => {
            if (likeCount === 0) { // Impede mais de 1 like
                likeCount++;
                localStorage.setItem("likeCount", likeCount); // Armazena o número de curtidas no localStorage
                likeCountElement.textContent = likeCount; // Atualiza o contador
                likeButton.disabled = true; // Desabilita o botão após o primeiro clique
                likeButton.style.backgroundColor = "#D3D3D3"; // Muda a cor para indicar que foi clicado
                likeButton.style.cursor = "not-allowed"; // Muda o cursor para indicar que o botão está desativado
            }
        });
    </script>
</body>
</html>
