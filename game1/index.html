<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página com Estilo Glass</title>
    <style>
        body {
            background: url('https://via.placeholder.com/1500') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .glass-box {
            width: 300px;
            height: 300px;
            background-color: rgba(255, 255, 255, 0.3); /* Cor branca com transparência */
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.6); /* Borda com efeito suave */
            backdrop-filter: blur(10px); /* Efeito de desfoque de fundo */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* Sombra suave */
        }
    </style>
</head>
<body>
    <div class="glass-box"></div>
</body>
</html>
