<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title></title>

    <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

    <style>
        #game-container {
            width: 800px;
            height: 600px;
            position: relative;
            border: 5px solid #000; /* Borda preta ao redor do jogo */
            margin: 50px auto; /* Centraliza o container na página */
        }

        h1 {
            text-align: center;
            width: 100%;
            color: #333;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script>
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();

            const container = document.getElementById("game-container");
            container.appendChild(player);

            player.load("410250_burger_restaurant.swf");
        });
    </script>
</body>
</html>
