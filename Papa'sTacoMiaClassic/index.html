<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>🌺 Y2K Games</title>

  <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

  <style>
    body {
      display: flex;
      justify-content: center; /* Centraliza o conteúdo horizontalmente */
      align-items: center;     /* Centraliza o conteúdo verticalmente */
      height: 100vh;
      margin: 0;
      background-color: #FFC7EA; /* Cor de fundo da página */
    }

    #game-container {
      width: 600px;
      height: 400px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 20px solid rgba(255, 165, 0, 0.7);
      border-radius: 55px;
      background: rgba(255, 165, 0, 0.1);
      box-shadow: 0 0 55px 5px rgba(255, 165, 0, 0.8);
      backdrop-filter: blur(50px);
      display: flex;
      justify-content: space-around; /* Espaço entre os elementos */
    }

    #game-container > div {
      width: 30%; /* Cada parte do jogo vai ocupar 30% do contêiner */
      height: 100%;
    }

    #game-container > div > object {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    h1 {
      position: absolute;
      top: 20px;
      text-align: center;
      width: 100%;
      color: #333;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="part1"></div>
    <div id="part2"></div>
    <div id="part3"></div>
  </div>

  <script>
    // Função para carregar um arquivo SWF em uma parte específica do contêiner
    function loadSWF(swfFile, partId) {
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();

      const container = document.getElementById(partId);
      container.appendChild(player);

      player.load(swfFile);

      // Ajuste para preencher completamente o contêiner sem cortar
      player.style.width = "100%";
      player.style.height = "100%";
      player.style.objectFit = "contain"; // Redimensiona o conteúdo sem cortar
    }

    // Carregar os três arquivos SWF simultaneamente
    window.addEventListener("load", () => {
      loadSWF("papas-taco-mia.swf", "part1");
      loadSWF("PapasTacop.swf", "part2");
      loadSWF("services.swf", "part3");
    });
  </script>
</body>
</html>
