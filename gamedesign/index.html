<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>🌺 Y2K Games</title>

    <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        /* Estilo do fundo da página */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #FF8C00; /* Fundo laranja vibrante */
        }

        /* Estilo da janela (borda do Windows) */
        #game-container {
            width: 550px;
            height: 400px;
            position: relative;
            background: rgba(255, 255, 255, 0.2);
            border: 20px solid #FF66B2; /* Borda bem mais grossa e rosa */
            border-radius: 40px;
            box-shadow: 0 0 20px 5px rgba(255, 102, 178, 0.8);
            backdrop-filter: blur(10px);
            overflow: hidden;
            animation: neon 1.5s ease-in-out infinite alternate; /* Efeito neon */
        }

        /* Animação de efeito neon */
        @keyframes neon {
            0% { box-shadow: 0 0 10px rgba(255, 0, 255, 1); }
            100% { box-shadow: 0 0 80px rgba(255, 0, 255, 1); }
        }

        /* Botão neon estilizado */
        .neon-button {
            background-color: #ff3399;
            color: white;
            border: 3px solid #ff66b2;
            padding: 15px 30px;
            font-size: 20px;
            font-family: 'Press Start 2P', sans-serif;
            border-radius: 30px;
            box-shadow: 0 0 10px rgba(255, 51, 153, 1);
            transition: all 0.3s ease;
        }

        .neon-button:hover {
            background-color: #ff66b2;
            border-color: #ff3399;
            box-shadow: 0 0 20px rgba(255, 51, 153, 1);
        }

    </style>
</head>
<body>

    <!-- Container para o conteúdo do jogo -->
    <div id="game-container">
        <!-- O conteúdo do jogo vai aqui -->
    </div>

    <script>
        // Carregar o player Ruffle com o arquivo SWF
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("game-container");
            container.appendChild(player);
            player.load("Puanli_Giydirme_21.swf");
        });
    </script>

</body>
</html>
