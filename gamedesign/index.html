<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>🌺 Y2K Games</title>

    <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #ff3366, #00cc66); /* Degradê vibrante rosa avermelhado e verde */
        }

        #game-container {
            width: 550px;
            height: 400px;
            position: center;
            top: 100px;
            left: 100px;
            border: 12px solid #FF66B2; /* Cor de borda neon (rosa) */
            border-radius: 40px; /* Bordas arredondadas com estilo mais moderno */
            background: rgba(255, 255, 255, 0.2); /* Fundo semi-transparente para o toque futurista */
            box-shadow: 0 0 20px 5px rgba(255, 102, 178, 0.8); /* Efeito neon rosa nas bordas */
            backdrop-filter: blur(10px); /* Desfoque do fundo para dar aquele toque moderno */
            overflow: hidden;
            position: relative;
        }

        #game-container:before {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            background: rgba(0, 0, 0, 0.3); /* Fundo semi-transparente com sombra suave */
            border-radius: 50px;
            z-index: -1;
        }

        h1 {
            position: absolute;
            top: 20px;
            text-align: center;
            width: 100%;
            color: #fff;
            font-family: 'DotGothic16', sans-serif; /* Fonte digital estilo coreano / Y2K */
            font-size: 36px;
            text-shadow: 0 0 10px rgba(255, 102, 178, 0.9); /* Efeito de brilho */
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet"> <!-- Fonte estilo digital coreano -->
</head>
<body>
    <div id="game-container">
        <!-- O conteúdo do jogo vai aqui -->
    </div>

    <script>
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();

            const container = document.getElementById("game-container");
            container.appendChild(player);

            player.load("Puanli_Giydirme_21.swf");
        });
    </script>
</body>
</html>
