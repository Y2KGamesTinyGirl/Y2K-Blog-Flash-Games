<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>🌺 Y2K Games</title>

    <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #F1A7C6, #A3E4B1); /* Rosa Barbie e Verde feminino */
        }

        #game-container {
            width: 550px;
            height: 400px;
            position: relative;
            border: 12px solid #FF66B2;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px 5px rgba(255, 102, 178, 0.8);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        h1 {
            position: absolute;
            top: 20px;
            text-align: center;
            width: 100%;
            color: #fff;
            font-family: 'Press Start 2P', sans-serif;
            font-size: 36px;
            text-shadow: 0 0 15px rgba(255, 102, 178, 1), 0 0 30px rgba(255, 102, 178, 0.8);
        }

        /* Botão estilizado Y2K */
        .y2k-button {
            background-color: #FF3366;
            color: white;
            border: 3px solid #FF66B2;
            padding: 15px 30px;
            font-size: 20px;
            font-family: 'Press Start 2P', sans-serif;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 102, 178, 1);
            transition: all 0.3s ease;
        }

        .y2k-button:hover {
            background-color: #00cc66;
            border-color: #00cc66;
            box-shadow: 0 0 20px rgba(0, 204, 102, 1);
        }

        /* Efeito de partículas */
        #particles-js {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

    </style>
</head>
<body>

    <!-- Container para o conteúdo do jogo -->
    <div id="game-container">
        <!-- O conteúdo do jogo vai aqui -->
        <h1>Y2K Games</h1>
        <!-- Botão de exemplo -->
        <button class="y2k-button">Jogar</button>
    </div>

    <!-- Adicionando partículas interativas -->
    <div id="particles-js"></div>

    <script>
        // Inicializando o Particles.js para o fundo interativo
        particlesJS("particles-js", {
            particles: {
                number: {
                    value: 100,
                    density: { enable: true, value_area: 800 }
                },
                color: { value: "#FF3366" },
                shape: {
                    type: "circle",
                    stroke: { width: 0, color: "#fff" }
                },
                opacity: { value: 0.5 },
                size: { value: 5 },
                line_linked: { enable: false },
                move: { enable: true, speed: 2, direction: "none" }
            }
        });

        // Carregar o player Ruffle com o arquivo SWF
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("game-container");
            container.appendChild(player);
            player.load("Puanli_Giydirme_21.swf");
        });
    </script>

</body>
</html>
