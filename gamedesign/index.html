<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>🌺 Y2K Games</title>

    <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #FF007F, #00FF70); /* Rosa saturado e verde saturado */
        }

        #game-container {
            width: 550px;
            height: 400px;
            position: relative;
            border: 12px solid #FF66B2;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px 5px rgba(255, 102, 178, 0.8);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        /* Efeito de partículas */
        #particles-js {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

    </style>
</head>
<body>

    <!-- Container para o conteúdo do jogo -->
    <div id="game-container">
        <!-- Sem texto ou botões -->
    </div>

    <!-- Adicionando partículas interativas -->
    <div id="particles-js"></div>

    <script>
        // Inicializando o Particles.js para o fundo interativo
        particlesJS("particles-js", {
            particles: {
                number: {
                    value: 100,
                    density: { enable: true, value_area: 800 }
                },
                color: { value: "#FFFF00" }, /* Partículas amarelas vibrantes */
                shape: {
                    type: "circle",
                    stroke: { width: 0, color: "#fff" }
                },
                opacity: { value: 0.7 },
                size: { value: 5 },
                line_linked: { enable: false },
                move: { enable: true, speed: 3, direction: "none" }
            }
        });

        // Carregar o player Ruffle com o arquivo SWF
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("game-container");
            container.appendChild(player);
            player.load("Puanli_Giydirme_21.swf");
        });
    </script>

</body>
</html>
