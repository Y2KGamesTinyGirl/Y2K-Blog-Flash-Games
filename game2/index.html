<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo Flash com Ruffle</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #FF69B4; /* Cor de fundo da página */
    }
    #flash-game-container {
      position: relative;
      width: 800px; /* Largura do contêiner */
      height: 600px; /* Altura do contêiner */
      border: 5px solid #000; /* Borda ao redor do jogo */
      box-sizing: border-box;
    }
    #flash-game {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain; /* Evita que o jogo se estique ou distorça */
    }
  </style>
</head>
<body>

  <!-- Contêiner para o jogo com borda -->
  <div id="flash-game-container">
    <div id="flash-game"></div>
  </div>

  <script>
    var ruffle = window.RufflePlayer.newest();
    var player = ruffle.createPlayer();
    document.getElementById('flash-game').appendChild(player);

    // Carrega o jogo SWF
    player.load('shopaholic_hawaii.swf');
  </script>

</body>
</html>
