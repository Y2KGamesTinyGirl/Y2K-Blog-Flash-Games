<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flash Game</title>

  <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #000; /* Para contraste */
    }

    /* Container com borda simples */
    #game-wrapper {
      width: 800px;
      height: 600px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 5px solid orange; /* Borda simples e laranja */
    }

    /* Container do jogo */
    #game-container {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <div id="game-container"></div> <!-- Container onde o jogo será carregado -->
  </div>

  <script>
    window.addEventListener("load", () => {
      const ruffle = window.RufflePlayer.newest(); // Cria a versão mais recente do player Ruffle
      const player = ruffle.createPlayer(); // Cria o player para rodar o arquivo SWF

      const container = document.getElementById("game-container"); // Pega o container onde o jogo será inserido
      container.appendChild(player); // Adiciona o player ao container

      player.load("shopaholic_hawaii.swf"); // Carrega o jogo Flash (arquivo SWF) no player
    });
  </script>
</body>
</html>
