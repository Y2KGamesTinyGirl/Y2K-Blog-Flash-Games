<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo Flash com Ruffle</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>
  <style>
    /* Estilo para centralizar o jogo na tela */
    html, body {
      height: 100%; /* Corrigido para preencher 100% da altura */
      margin: 0; /* Remove a margem padrão */
      display: flex;
      justify-content: center; /* Alinha o jogo ao centro horizontal */
      align-items: center; /* Alinha o jogo ao centro vertical */
      background-color: #FF69B4; /* Cor de fundo */
    }
    #flash-game {
      width: 800px; /* Largura do jogo (ajuste conforme necessário) */
      height: 600px; /* Altura do jogo (ajuste conforme necessário) */
      border: 5px solid #000; /* Borda preta de 5px ao redor do jogo */
      box-sizing: border-box; /* Garantir que a borda não afete o tamanho do contêiner */
    }
  </style>
</head>
<body>

  <div id="flash-game">
    <script>
      var ruffle = window.RufflePlayer.newest();
      var player = ruffle.createPlayer();
      document.getElementById('flash-game').appendChild(player);
      player.load('shopaholic_hawaii');
    </script>
  </div>

</body>
</html>
